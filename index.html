<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InmoAI Panel - Gestión de Leads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#1e40af',
                        success: '#16a34a',
                        warning: '#d97706',
                        danger: '#dc2626',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-lg">IA</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900">InmoAI Panel</h1>
                    <p class="text-sm text-gray-500">Gestión de leads inmobiliarios</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="connection-status" class="text-sm text-gray-400">Desconectado</span>
                <button onclick="app.loadLeads()" class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-secondary transition">
                    Actualizar
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">

        <!-- Stats Bar -->
        <div id="stats-bar" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500">Total leads</p>
                <p id="stat-total" class="text-2xl font-bold text-gray-900">-</p>
            </div>
            <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500">Nuevos</p>
                <p id="stat-nuevos" class="text-2xl font-bold text-primary">-</p>
            </div>
            <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500">En seguimiento</p>
                <p id="stat-seguimiento" class="text-2xl font-bold text-warning">-</p>
            </div>
            <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500">Visitas agendadas</p>
                <p id="stat-visitas" class="text-2xl font-bold text-success">-</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100 mb-6">
            <div class="flex flex-wrap gap-4 items-center">
                <input
                    type="text"
                    id="filter-search"
                    placeholder="Buscar por nombre, email o teléfono..."
                    class="flex-1 min-w-[200px] border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                    oninput="app.filterLeads()"
                >
                <select id="filter-estado" class="border border-gray-300 rounded-lg px-4 py-2 text-sm" onchange="app.filterLeads()">
                    <option value="">Todos los estados</option>
                    <option value="Nuevo">Nuevo</option>
                    <option value="Contactado">Contactado</option>
                    <option value="Seguimiento">Seguimiento</option>
                    <option value="Visita agendada">Visita agendada</option>
                    <option value="Cerrado Ganado">Cerrado Ganado</option>
                    <option value="Cerrado Perdido">Cerrado Perdido</option>
                    <option value="Descartado">Descartado</option>
                </select>
                <select id="filter-prioridad" class="border border-gray-300 rounded-lg px-4 py-2 text-sm" onchange="app.filterLeads()">
                    <option value="">Todas las prioridades</option>
                    <option value="Alta">Alta</option>
                    <option value="Media-Alta">Media-Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>
            </div>
        </div>

        <!-- Leads Table -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Lead</th>
                            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Contacto</th>
                            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Operación</th>
                            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Estado</th>
                            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Prioridad</th>
                            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Próxima acción</th>
                            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table-body" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="7" class="px-4 py-12 text-center text-gray-400">
                                Configura la URL del webhook en <code>js/config.js</code> para cargar leads
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Lead Detail Modal -->
    <div id="lead-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <!-- Modal Header -->
            <div class="flex items-center justify-between p-6 border-b border-gray-200">
                <h2 id="modal-title" class="text-xl font-bold text-gray-900">Ficha del lead</h2>
                <button onclick="app.closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>

            <!-- Modal Body -->
            <div id="modal-body" class="p-6">
                <!-- Populated by JS -->
            </div>

            <!-- Modal Actions -->
            <div id="modal-actions" class="p-6 border-t border-gray-200 bg-gray-50 rounded-b-xl">
                <p class="text-sm font-semibold text-gray-700 mb-3">Acciones rápidas</p>
                <div class="flex flex-wrap gap-2">
                    <button onclick="app.action('whatsapp')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition">
                        Enviar WhatsApp
                    </button>
                    <button onclick="app.action('visita')" class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-secondary transition">
                        Agendar visita
                    </button>
                    <button onclick="app.action('estado')" class="bg-warning text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-amber-700 transition">
                        Cambiar estado
                    </button>
                    <button onclick="app.action('agente')" class="bg-gray-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-700 transition">
                        Asignar agente
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
